version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: vento-db
    environment:
      POSTGRES_DB: vento_db
      POSTGRES_USER: vento
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: vento-api
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/vento_db
      SPRING_DATASOURCE_USERNAME: vento
      SPRING_DATASOURCE_PASSWORD: password
    ports:
      - "8080:8080"
    volumes:
      - uploads:/app/uploads

  frontend:
    build: ./frontend
    container_name: vento-ui
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  pgdata:
  uploads:
