<rect x="456" y="656" width="12" height="12" rx="2" fill="#F1EFE8" stroke="#888780" stroke-width="0.8"/><text font-family="Segoe UI,sans-serif" font-size="10" fill="#444441" x="474" y="662" dominant-baseline="central">Regular field</text>
<text font-family="Segoe UI,sans-serif" font-size="10" fill="#888780" x="44" y="684" dominant-baseline="central">Relation: files.uploadedBy (many) → users._id (one) · password never returned (select:false)</text>
