<rect x="44" y="578" width="185" height="62" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/><text font-family="Segoe UI,sans-serif" font-size="11" font-weight="700" fill="#085041" x="136" y="594" text-anchor="middle" dominant-baseline="central">File access (RBAC)</text><text font-family="Segoe UI,sans-serif" font-size="10" fill="#0F6E56" x="136" y="610" text-anchor="middle" dominant-baseline="central">{ isDeleted: false,</text><text font-family="Segoe UI,sans-serif" font-size="10" fill="#0F6E56" x="136" y="626" text-anchor="middle" dominant-baseline="central">allowedRoles: userRole }</text>
