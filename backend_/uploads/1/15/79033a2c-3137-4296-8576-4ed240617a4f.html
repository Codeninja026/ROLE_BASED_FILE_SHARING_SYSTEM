<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Valentine Rose 🌹</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    height: 100vh;
    background: radial-gradient(circle at top, #ffb6c1, #8b0000);
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
}

.container {
    text-align: center;
    z-index: 2;
}

h1 {
    font-size: 3rem;
    margin-bottom: 10px;
    animation: fadeIn 2s ease;
}

p {
    font-size: 1.2rem;
    max-width: 500px;
    margin: auto;
    line-height: 1.6;
    animation: fadeIn 3s ease;
}

/* 🌹 Rose */
.rose {
    width: 150px;
    height: 150px;
    background: radial-gradient(circle at 30% 30%, #ff4d6d, #b0003a);
    border-radius: 50%;
    position: relative;
    margin: 40px auto;
    animation: bloom 4s infinite alternate;
    box-shadow: 0 0 40px rgba(255, 77, 109, 0.7);
}

.rose::before,
.rose::after {
    content: "";
    position: absolute;
    width: 150px;
    height: 150px;
    background: inherit;
    border-radius: 50%;
}

.rose::before {
    top: -40px;
    left: 0;
}

.rose::after {
    top: 0;
    left: -40px;
}

.stem {
    width: 8px;
    height: 200px;
    background: linear-gradient(#0f9d58, #064e2a);
    margin: auto;
    border-radius: 4px;
}

/* ❤️ Floating hearts */
.heart {
    position: absolute;
    font-size: 20px;
    animation: floatUp 6s linear infinite;
    opacity: 0.8;
}

/* 🍓 Yogurt Popup */
.popup {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 5;
}

.popup-box {
    background: linear-gradient(135deg, #ff4d6d, #ffb6c1);
    width: 280px;
    padding: 25px;
    border-radius: 25px;
    text-align: center;
    color: white;
    animation: pop 0.6s ease;
    box-shadow: 0 0 30px rgba(255,255,255,0.4);
}

.yogurt {
    width: 120px;
    height: 140px;
    background: white;
    border-radius: 0 0 25px 25px;
    margin: 20px auto;
    position: relative;
    color: #b0003a;
    font-weight: bold;
}

.yogurt::before {
    content: "";
    position: absolute;
    top: -25px;
    left: 0;
    width: 100%;
    height: 25px;
    background: #ffe4ec;
    border-radius: 20px 20px 0 0;
}

.yogurt span {
    position: absolute;
    bottom: 15px;
    width: 100%;
}

/* Button */
button {
    margin-top: 25px;
    padding: 12px 25px;
    font-size: 1rem;
    border: none;
    border-radius: 25px;
    background: #ff4d6d;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #ff1e50;
    transform: scale(1.05);
}

/* Animations */
@keyframes bloom {
    0% { transform: scale(1); }
    100% { transform: scale(1.1); }
}

@keyframes floatUp {
    0% { transform: translateY(100vh); opacity: 0; }
    50% { opacity: 1; }
    100% { transform: translateY(-10vh); opacity: 0; }
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes pop {
    from { transform: scale(0); }
    to { transform: scale(1); }
}
</style>
</head>

<body>

<div class="container">
    <h1>Happy Valentine’s Day 🌹</h1>

    <div class="rose"></div>
    <div class="stem"></div>

    <p>
        I noticed something cute about you… 💕  
        You love yogurt in the morning.
    </p>

    <button onclick="openPopup()">Click for a Surprise 💌</button>
</div>

<!-- 🍓 Yogurt Popup -->
<div class="popup" id="popup" onclick="closePopup()">
    <div class="popup-box">
        <h2>Rose Yogurt 🌹🥣</h2>
        <div class="yogurt">
            <span>Rose Flavor</span>
        </div>
        <p>
            Just like this yogurt,  
            you make my mornings sweeter 💖
        </p>
        <small>(tap anywhere to close)</small>
    </div>
</div>

<script>
function openPopup() {
    document.getElementById("popup").style.display = "flex";
}

function closePopup() {
    document.getElementById("popup").style.display = "none";
}

// Floating hearts
setInterval(() => {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.textContent = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (Math.random() * 3 + 4) + "s";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 6000);
}, 300);
</script>

</body>
</html>
