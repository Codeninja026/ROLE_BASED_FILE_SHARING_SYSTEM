<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login / Signup</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      background: #4285f4;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 32px;
      padding: 40px 20px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 36px 32px;
      width: 340px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card:nth-child(2) { animation-delay: 0.1s; }

    h2 {
      text-align: center;
      font-size: 1.6rem;
      font-weight: 800;
      color: #1a1a2e;
      margin-bottom: 24px;
    }

    .input-wrap {
      position: relative;
      margin-bottom: 14px;
    }

    input[type="email"],
    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 13px 16px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: inherit;
      color: #333;
      background: #fafafa;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: #4285f4;
      background: #fff;
    }

    input::placeholder { color: #aaa; }

    .toggle-pw {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #aaa;
      font-size: 1rem;
      user-select: none;
    }

    .forgot {
      text-align: right;
      margin-bottom: 18px;
    }

    .forgot a {
      font-size: 0.88rem;
      color: #4285f4;
      text-decoration: none;
      font-weight: 600;
    }

    .btn-primary {
      width: 100%;
      padding: 13px;
      background: #4285f4;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-bottom: 14px;
    }

    .btn-primary:hover { background: #3367d6; }
    .btn-primary:active { transform: scale(0.98); }

    .switch-text {
      text-align: center;
      font-size: 0.88rem;
      color: #666;
      margin-bottom: 18px;
    }

    .switch-text a {
      color: #4285f4;
      font-weight: 700;
      text-decoration: none;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      color: #bbb;
      font-size: 0.85rem;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e5e5e5;
    }

    .btn-social {
      width: 100%;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1.5px solid #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      font-size: 0.95rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-bottom: 10px;
    }

    .btn-social:active { transform: scale(0.98); }

    .btn-facebook {
      background: #3b5998;
      color: #fff;
      border-color: #3b5998;
    }

    .btn-facebook:hover { opacity: 0.9; }

    .btn-google {
      background: #fff;
      color: #444;
    }

    .btn-google:hover { background: #f5f5f5; }

    .icon-fb {
      width: 28px;
      height: 28px;
      background: #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      color: #3b5998;
      font-size: 1rem;
      flex-shrink: 0;
    }

    .icon-g {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
    }

    /* Show only active panel on mobile */
    @media (max-width: 720px) {
      body { flex-direction: column; gap: 20px; }
      .card { width: 100%; max-width: 360px; }
    }
  </style>
</head>
<body>

  <!-- LOGIN CARD -->
  <div class="card" id="login-card">
    <h2>Login</h2>

    <div class="input-wrap">
      <input type="email" id="login-email" placeholder="Email" />
    </div>

    <div class="input-wrap">
      <input type="password" id="login-pw" placeholder="Password" />
      <span class="toggle-pw" onclick="togglePw('login-pw', this)">👁️</span>
    </div>

    <div class="forgot"><a href="#">Forgot password?</a></div>

    <button class="btn-primary">Login</button>

    <p class="switch-text">Don't have an account? <a href="#" onclick="showSignup()">Signup</a></p>

    <div class="divider">Or</div>

    <button class="btn-social btn-facebook">
      <span class="icon-fb">f</span>
      Login with Facebook
    </button>

    <button class="btn-social btn-google">
      <svg class="icon-g" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.8 2.5 30.2 0 24 0 14.6 0 6.6 5.4 2.7 13.3l7.8 6C12.3 13.3 17.7 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4 6.9-10 6.9-17z"/>
        <path fill="#FBBC05" d="M10.5 28.7A14.6 14.6 0 0 1 9.5 24c0-1.6.3-3.2.8-4.7l-7.8-6A24 24 0 0 0 0 24c0 3.9.9 7.5 2.6 10.8l7.9-6.1z"/>
        <path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.5-5.8c-2 1.4-4.6 2.2-7.7 2.2-6.3 0-11.6-4.2-13.5-9.9l-7.9 6.1C6.5 42.5 14.6 48 24 48z"/>
      </svg>
      Login with Google
    </button>
  </div>

  <!-- SIGNUP CARD -->
  <div class="card" id="signup-card">
    <h2>Signup</h2>

    <div class="input-wrap">
      <input type="email" id="signup-email" placeholder="Email" />
    </div>

    <div class="input-wrap">
      <input type="password" id="signup-pw" placeholder="Create password" />
    </div>

    <div class="input-wrap">
      <input type="password" id="signup-confirm" placeholder="Confirm password" />
      <span class="toggle-pw" onclick="togglePw('signup-confirm', this)">👁️</span>
    </div>

    <button class="btn-primary" style="margin-top:4px;">Signup</button>

    <p class="switch-text">Already have an account? <a href="#" onclick="showLogin()">Login</a></p>

    <div class="divider">Or</div>

    <button class="btn-social btn-facebook">
      <span class="icon-fb">f</span>
      Login with Facebook
    </button>

    <button class="btn-social btn-google">
      <svg class="icon-g" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.8 2.5 30.2 0 24 0 14.6 0 6.6 5.4 2.7 13.3l7.8 6C12.3 13.3 17.7 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4 6.9-10 6.9-17z"/>
        <path fill="#FBBC05" d="M10.5 28.7A14.6 14.6 0 0 1 9.5 24c0-1.6.3-3.2.8-4.7l-7.8-6A24 24 0 0 0 0 24c0 3.9.9 7.5 2.6 10.8l7.9-6.1z"/>
        <path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.5-5.8c-2 1.4-4.6 2.2-7.7 2.2-6.3 0-11.6-4.2-13.5-9.9l-7.9 6.1C6.5 42.5 14.6 48 24 48z"/>
      </svg>
      Login with Google
    </button>
  </div>

  <script>
    function togglePw(id, icon) {
      const input = document.getElementById(id);
      if (input.type === 'password') {
        input.type = 'text';
        icon.style.opacity = '0.5';
      } else {
        input.type = 'password';
        icon.style.opacity = '1';
      }
    }

    // On mobile, toggle between cards
    function showSignup() {
      if (window.innerWidth <= 720) {
        document.getElementById('login-card').style.display = 'none';
        document.getElementById('signup-card').style.display = 'block';
      }
    }

    function showLogin() {
      if (window.innerWidth <= 720) {
        document.getElementById('signup-card').style.display = 'none';
        document.getElementById('login-card').style.display = 'block';
      }
    }
  </script>
</body>
</html>
