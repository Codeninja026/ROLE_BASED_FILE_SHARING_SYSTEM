server:
  port: 8080

spring:
  application:
    name: vento

  datasource:
    url: jdbc:postgresql://localhost:5432/vento_db
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

app:
  jwt:
    secret: b3BlbnNlY3JldGtleWZvcnNoYXJldmF1bHRlbnRlcnByaXNlYXBwMjAyNHByb2R1Y3Rpb25yZWFkeQ==
    expiration-ms: 86400000

  storage:
    upload-dir: ./uploads
    max-file-size: 524288000

  cors:
    allowed-origins: http://localhost:5173,http://localhost:3000

logging:
  level:
    com.vento: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.security: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

